- name: Deploy Maven Artifact
  hosts: web
  become: yes
  tasks:
    - name: Ensure apps directory exists
      file:
        path: /var/lib/jenkins/workspace/ttttttt/apps
        state: directory
        mode: '0755'

    - name: Copy JAR file
      copy:
        src: /var/lib/jenkins/workspace/ttttttt/myapp/target/myapp-1.0-SNAPSHOT.jar
        dest: /var/lib/jenkins/workspace/ttttttt/apps/myapp-1.0-SNAPSHOT.jar

    - name: Run application
      shell: nohup java -jar /var/lib/jenkins/workspace/ttttttt/apps/myapp-1.0-SNAPSHOT.jar &
