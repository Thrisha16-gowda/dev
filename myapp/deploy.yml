- name: Deploy Maven Artifact
  hosts: web
  become: no

  tasks:
    - name: Ensure app directory exists
      file:
        path: /home/jenkins/apps
        state: directory
        owner: jenkins
        group: jenkins
        mode: '0755'

    - name: Copy JAR file
      copy:
        src: /var/lib/jenkins/workspace/pgm6/myapp/target/myapp-1.0-SNAPSHOT.jar
        dest: /home/jenkins/apps/myapp-1.0-SNAPSHOT.jar

    - name: Run application
      shell: nohup java -jar /home/jenkins/apps/myapp-1.0-SNAPSHOT.jar &
